version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    container_name: realtime_editor_backend
    ports:
      - "8080:8080"
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/realtime_editor
    restart: unless-stopped

volumes:
  mongodb_data:
