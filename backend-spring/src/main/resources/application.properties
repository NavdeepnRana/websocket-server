server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/realtime_editor

# Socket.IO Configuration
# We'll run Socket.IO on port 5000 so the frontend doesn't need changes
socket.io.port=5000

# JWT Configuration
# Minimum 256-bit secret key for HMAC-SHA256
jwt.secret=your_super_secret_jwt_key_that_is_at_least_256_bits_long_change_in_prod
jwt.expiration=3600000
